# ============================================================
# application.properties - SLIOR Backend
# Configuraciˇn de desarrollo local
# ============================================================

spring.application.name=slior-backend
server.port=8080

# ======= Base de Datos PostgreSQL =======
spring.datasource.url=jdbc:postgresql://localhost:5432/slior_db
spring.datasource.username=slior_user
spring.datasource.password=slior_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# ======= JPA / Hibernate =======
# update: crea/modifica tablas automßticamente en desarrollo
# En producciˇn usar 'validate' o 'none'
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ======= JWT =======
# Ver: docs/SETUP_LOCAL.md
jwt.secret=PLACEHOLDER_SET_IN_APPLICATION_LOCAL_PROPERTIES
# 1800000 ms = 30 minutos (access token)
jwt.expiration=1800000
# 604800000 ms = 7 dÝas (refresh token - fase futura)
jwt.refresh-expiration=604800000

# ======= Logging =======
logging.level.com.slior=DEBUG
logging.level.org.springframework.security=INFO
